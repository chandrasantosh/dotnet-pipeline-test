name: .NET CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: |
          files=$(find . -name "*.csproj")
          dotnet restore $files

      - name: Build
        run: |
          files=$(find . -name "*.csproj")
          dotnet build $files --configuration Release --no-restore

      - name: Test
        run: |
          files=$(find . -name "*.csproj")
          dotnet test $files --logger "trx"

      - name: TODO Deployment
        run: echo "TODO – Deployment"
