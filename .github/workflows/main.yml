name: .NET CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore unit-testing-using-dotnet-test.sln

      - name: Build
        run: dotnet build unit-testing-using-dotnet-test.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test unit-testing-using-dotnet-test.sln --logger "trx"

      - name: TODO Deployment
        run: echo "TODO – Deployment"
